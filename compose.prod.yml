# Production stack for dev-vault, deployed on a single host (e.g. Hetzner).
# Expects the three app repos cloned side by side next to this one:
#   dev-vault-server/  dev-vault-client/  dev-vault-admin/  dev-vault-infra/
#
# Only nginx is exposed to the internet (80/443); everything else stays private.
# First-time TLS setup: run ./init-letsencrypt.sh once, then:
#   docker compose -f compose.prod.yml up -d --build

services:
  backend:
    build:
      context: ../dev-vault-server
      target: prod
    environment:
      NODE_ENV: production
      PORT: 3030
      # Browser-facing origins allowed to call the API.
      CORS_ORIGIN: https://app.${DOMAIN},https://admin.${DOMAIN}
      # Private, server-to-server connections over the compose network.
      DATABASE_URL: postgres://devvault:${POSTGRES_PASSWORD}@postgres:5432/devvault
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  client:
    build:
      context: ../dev-vault-client
      target: prod
      args:
        # Baked into the static bundle at build time.
        VITE_API_URL: https://api.${DOMAIN}
    restart: unless-stopped

  admin:
    build:
      context: ../dev-vault-admin
      target: prod
      args:
        VITE_API_URL: https://api.${DOMAIN}
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: devvault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: devvault
    # No published ports — reachable only inside the private network.
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devvault"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    # No published ports — reachable only inside the private network.
    volumes:
      - redisdata:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - certbot_conf:/etc/letsencrypt:ro       # certificates (written by certbot)
      - certbot_www:/var/www/certbot:ro        # ACME challenge webroot
    depends_on:
      - backend
      - client
      - admin
    # Render the config (substitute only ${DOMAIN}, keep nginx's own $vars — we do
    # envsubst by hand because overriding the command skips the image's auto-render),
    # then start nginx and reload every 6h so renewed certificates are picked up.
    command: >
      /bin/sh -c "envsubst '$${DOMAIN}' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf;
      while :; do sleep 6h & wait $${!}; nginx -s reload; done & exec nginx -g 'daemon off;'"
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Attempt renewal twice a day; certbot only acts when a cert is near expiry.
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  certbot_conf:
  certbot_www:
