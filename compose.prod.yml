# Production stack for dev-vault, deployed on a single host (e.g. Hetzner).
# Expects the three app repos cloned side by side next to this one:
#   dev-vault-server/  dev-vault-client/  dev-vault-admin/  dev-vault-infra/
# Only Caddy is exposed to the internet (80/443); everything else stays private.
#   docker compose -f compose.prod.yml up -d --build

services:
  backend:
    build:
      context: ../dev-vault-server
      target: prod
    environment:
      NODE_ENV: production
      PORT: 3030
      # Browser-facing origins allowed to call the API.
      CORS_ORIGIN: https://app.${DOMAIN},https://admin.${DOMAIN}
      # Private, server-to-server connections over the compose network.
      DATABASE_URL: postgres://devvault:${POSTGRES_PASSWORD}@postgres:5432/devvault
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  client:
    build:
      context: ../dev-vault-client
      target: prod
      args:
        # Baked into the static bundle at build time.
        VITE_API_URL: https://api.${DOMAIN}
    restart: unless-stopped

  admin:
    build:
      context: ../dev-vault-admin
      target: prod
      args:
        VITE_API_URL: https://api.${DOMAIN}
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: devvault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: devvault
    # No published ports — reachable only inside the private network.
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devvault"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    # No published ports — reachable only inside the private network.
    volumes:
      - redisdata:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # persisted TLS certificates
      - caddy_config:/config
    depends_on:
      - backend
      - client
      - admin
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
